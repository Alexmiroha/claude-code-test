<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- PromoHunter target-lock favicon: LogoMark crosshair on the brand dark tile -->
  <rect width="64" height="64" rx="14" fill="#0b0d12"/>
  <g stroke="#ff8c1a" stroke-width="5">
    <!-- 4 arcs centered on the tick axes: (19.7 + 7) * 4 = 2*pi*17 -->
    <circle cx="32" cy="32" r="17" fill="none" stroke-dasharray="19.7 7" stroke-dashoffset="9.85"/>
    <path d="M32 9.5V18.5M32 45.5V54.5M9.5 32H18.5M45.5 32H54.5"/>
  </g>
  <circle cx="32" cy="32" r="7" fill="#ff8c1a"/>
</svg>
